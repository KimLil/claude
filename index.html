<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Астрологические эксперименты</title>
<style>
  :root { --accent: #3a5a8c; --bg: #f5f4f0; --card: #fff; }
  body { font-family: Georgia, serif; background: var(--bg); color: #1a1a1a; margin: 0; }
  header { background: var(--accent); color: #fff; padding: 2rem; text-align: center; }
  header h1 { font-size: 1.6rem; font-weight: normal; }
  header p { opacity: .8; margin-top: .5rem; }
  .container { max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
  .empty { text-align: center; color: #888; padding: 3rem; }
</style>
</head>
<body>
<header>
  <h1>Слепые астрологические эксперименты</h1>
  <p>Результаты появятся здесь после первого запуска</p>
</header>
<div class="container">
  <p class="empty">Экспериментов пока нет.<br>Запустите скилл в Claude Code.</p>
</div>
</body>
</html>
